# fly.toml app configuration file generated for dzbanek-bot on 2026-07-16T12:47:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dzbanek-bot'
primary_region = 'ams'

[build]

[env]
  API_ENABLED = 'true'
  API_HOST = '0.0.0.0'
  API_PORT = '8080'
  NODE_ENV = 'production'
  OAUTH_REDIRECT_URI = 'https://dzbanek-bot.fly.dev/api/auth/callback'
  PUBLIC_BASE_URL = 'https://dzbanek-bot.fly.dev'
  WEBSITE_ORIGIN = 'https://kingvojtas.github.io,https://dzbanek-bot.vojtas.io,https://dzbanek-bot.fly.dev,http://127.0.0.1:3848,http://localhost:3848'
  WEBSITE_PRIMARY_ORIGIN = 'https://kingvojtas.github.io/dzbanek-bot-website'

[[mounts]]
  source = 'bot_data'
  destination = '/app/prisma/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
